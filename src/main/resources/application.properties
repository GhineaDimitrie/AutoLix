spring.application.name=AutoLix

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/parc_auto?createDatabaseIfNotExist=true}
spring.datasource.username=${MYSQLUSER:root}
spring.datasource.password=${MYSQLPASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

server.port=${PORT:8081}

app.upload.dir=${UPLOAD_DIR:./uploads}
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.tomcat.max-parameters=20000
server.tomcat.max-part-count=50
spring.sql.init.mode=always
