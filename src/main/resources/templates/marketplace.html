<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>Marketplace</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background-image: url("/images/login.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            padding: 25px;
            padding-top: 85px;

            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            color: white;
            position: relative;
            will-change: transform;
            transform: translateZ(0);
        }

        h1 {
            text-align: center;
            margin: 40px 0 30px 0;
        }

        /* ADVANCED FILTER */
        .advanced-filter {
            background: rgba(20, 24, 35, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 22px 22px 18px 22px;
            margin: 10px 0 22px 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);

            will-change: transform;
    transform: translateZ(0);

            /* ancoră pentru sortare */
            position: relative;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            gap: 14px 16px;
            align-items: end;
        }

        @media (max-width: 1050px) {
            .filter-grid { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
        }
        @media (max-width: 560px) {
            .filter-grid { grid-template-columns: 1fr; }
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12.5px;
            font-weight: 700;
            opacity: 0.95;
        }

        .filter-control {
            display: flex;
            align-items: center;
            gap: 8px;

            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.06);
        }

        .filter-control input,
        .filter-control select {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 14px;
        }

        .filter-control input::placeholder {
            color: rgba(255,255,255,0.65);
        }

        .filter-control:focus-within {
            border-color: rgba(47,164,245,0.9);
            box-shadow: 0 0 0 3px rgba(47,164,245,0.18);
        }

        /* RANGE (min/max în aceeași casetă) */
        .range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 560px) {
            .range { grid-template-columns: 1fr; }
        }

        /* === SORTARE FIX ÎN COLȚ STÂNGA-JOS (SINGURUL BLOC) === */
        .sort-box{
            position: absolute;
            left: 22px;
            bottom: 18px;
            width: 280px;
        }

        .sort-label{
            display:block;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .2px;
            color: rgba(255,255,255,0.85);
            margin: 0 0 6px 2px;
        }

        .sort-select{
            position: relative;
            width: 100%;
        }

        .sort-select select{
            width: 100%;
            height: 44px;
            padding: 10px 42px 10px 14px;
            border-radius: 12px;

            background: rgba(18, 22, 32, 0.95);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            outline: none;

            font-size: 14px;
            font-weight: 700;

            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;

            /* ajută pe Windows */
            color-scheme: dark;
        }

        .sort-select select:focus{
            border-color: rgba(47,164,245,0.9);
            box-shadow: 0 0 0 3px rgba(47,164,245,0.18);
        }

        .sort-select i{
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: rgba(255,255,255,0.75);
            font-size: 14px;
        }

        /* Placeholder să nu fie “șters” */
        .sort-select select:invalid{
            color: rgba(255,255,255,0.92);
        }

        /* Actions: în dreapta + spațiu pt sortare */
        .filter-actions{
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;

            padding-left: 310px;
            min-height: 54px;
        }

        @media (max-width: 900px){
            .sort-box{
                position: static;
                width: 100%;
                margin-top: 14px;
            }
            .filter-actions{
                padding-left: 0;
                justify-content: space-between;
            }
        }

        .filter-right{
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: #ff3c00;
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-btn:hover { background-color: #e63200; }

        .filter-reset {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
        }
        .filter-reset:hover {
            color: white;
            text-decoration: underline;
        }

        /* GRID listings */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            color: #111;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            overflow: hidden;

            will-change: transform;
    transform: translateZ(0);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price {
            font-size: 20px;
            font-weight: 800;
            color: #2fa4f5;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 14px;
            color: #333;
            margin: 4px 0;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            background: rgba(47,164,245,0.15);
            color: #1e88e5;
            margin-top: 8px;
        }

        .empty {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .card-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background-color: #2fa4f5;
            font-size: 13px;
            display: inline-block;
        }
        .btn-small:hover { background-color: #1e88e5; }

        /* Favorite button in cards */
        .fav-btn {
            border: 1px solid rgba(47,164,245,0.35);
            background: rgba(255,255,255,0.65);
            color: #0f2a44;
            padding: 7px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
            user-select: none;
            backdrop-filter: blur(8px);
        }
        .fav-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.85);
            border-color: rgba(47,164,245,0.65);
        }
        .fav-btn:active { transform: translateY(0px); }
        .fav-btn.is-fav {
            background: rgba(47,164,245,0.14);
            border-color: rgba(47,164,245,0.9);
            color: #1e88e5;
        }
        .fav-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .brands-container {
    background: rgba(20, 24, 35, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.brands-title {
    color: white;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 25px;
    letter-spacing: 0.5px;
}

.brands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px; /* Creează liniile fine de demarcație */
    background: rgba(255, 255, 255, 0.1); /* Culoarea liniilor */
}

.brand-item {
    background: rgba(20, 24, 35, 1);
    padding: 20px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.3s ease;
}

.brand-item:hover {
    background: rgba(255, 255, 255, 0.05);
    transform: translateY(-3px);
}

.brand-item img {
    height: 70px;
    width: auto;
    margin-bottom: 12px;
    object-fit: contain;

    opacity: 0.8;
    transition: opacity 0.3s;
}

.brand-item:hover img {
    opacity: 1;
    transform: scale(1.1);
}

.brand-item span {
    color: white;
    font-size: 15px;
    font-weight: 700;
}

/* Responsivitate pentru ecrane mici */
@media (max-width: 600px) {
    .brands-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}
    </style>
</head>

<body>

<div class="container">

    <!-- NAVBAR (nu o atingem) -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>Marketplace</h1>

    <!-- ADVANCED FILTER -->
    <div class="advanced-filter">
        <form th:action="@{/marketplace}" method="get">

            <div class="filter-grid">

                <div class="filter-group">
                    <label>Marcă</label>
                    <div class="filter-control">
                        <input type="text" name="marca" placeholder="Oricare" th:value="${marca}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Model</label>
                    <div class="filter-control">
                        <input type="text" name="modelul" placeholder="Oricare" th:value="${modelul}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Preț</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="pretMin" placeholder="Min" th:value="${pretMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="pretMax" placeholder="Max" th:value="${pretMax}">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Kilometraj</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="kmMin" placeholder="Min" th:value="${kmMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="kmMax" placeholder="Max" th:value="${kmMax}">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Combustibil</label>
                    <div class="filter-control">
                        <input type="text" name="combustibil" placeholder="Oricare" th:value="${combustibil}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Culoare</label>
                    <div class="filter-control">
                        <input type="text" name="culoarea" placeholder="Oricare" th:value="${culoarea}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Putere</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="putMin" placeholder="Min" th:value="${putMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="putMax" placeholder="Max" th:value="${putMax}">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>An</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="anMin" placeholder="Min" th:value="${anMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="anMax" placeholder="Max" th:value="${anMax}">
                        </div>
                    </div>
                </div>

            </div>

            <!-- SORTARE (colț stânga jos) -->
            <div class="sort-box">
                <label class="sort-label">Sortare</label>
                <div class="sort-select">
                    <select name="sort"  onchange="this.form.submit()">
                        <option value=""
                                th:selected="${sort == null || sort == ''}">
                            Recommended
                        </option>
                        <option value="price_asc" th:selected="${sort == 'price_asc'}">Preț (low → high)</option>
                        <option value="price_desc" th:selected="${sort == 'price_desc'}">Preț (high → low)</option>
                        <option value="year_asc" th:selected="${sort == 'year_asc'}">An (vechi → nou)</option>
                        <option value="year_desc" th:selected="${sort == 'year_desc'}">An (nou → vechi)</option>
                        <option value="km_asc" th:selected="${sort == 'km_asc'}">KM (low → high)</option>
                        <option value="km_desc" th:selected="${sort == 'km_desc'}">KM (high → low)</option>
                        <option value="pwr_asc" th:selected="${sort == 'pwr_asc'}">Putere (low → high)</option>
                        <option value="pwr_desc" th:selected="${sort == 'pwr_desc'}">Putere (high → low)</option>
                    </select>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>

            <div class="filter-actions">
                <div class="filter-right">
                    <a class="filter-reset" th:href="@{/marketplace}">↺ Resetează</a>
                    <button type="submit" class="filter-btn">Caută</button>
                </div>
            </div>

        </form>
    </div>


    <div th:if="${#lists.isEmpty(masini)}" class="empty">
        Nu există anunțuri încă.
    </div>

    <div class="grid" th:if="${not #lists.isEmpty(masini)}">
        <div class="card" th:each="m : ${masini}">

            <img th:if="${m.imageName != null}"
                 th:src="@{'/uploads/' + ${m.imageName}}"
                 style="width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:10px;">

            <div class="card-title" th:text="${m.marca} + ' ' + ${m.modelul}"></div>
            <div class="price" th:text="${#numbers.formatInteger(m.pretul, 0, 'POINT')} + ' €'"></div>

            <div class="meta" th:text="'Kilometraj: ' + ${#numbers.formatInteger(m.kilometraj, 0, 'POINT')} + ' km'"></div>
            <div class="meta" th:text="'Putere: ' + ${m.puterea} + ' CP'"></div>
            <div class="meta" th:text="'Culoare: ' + ${m.culoarea}"></div>
            <div class="meta" th:text="'Combustibil: ' + ${m.combustibil}"></div>
            <div class="meta" th:text="'Cuplu: ' + ${m.cuplul} + ' Nm'"></div>

            <span class="tag" th:text="${m.anul}"></span>

            <div class="card-actions">
                <a class="btn-small" th:href="@{'/listing/' + ${m.nr_inmatriculare}}">View details</a>

                <div sec:authorize="isAuthenticated()">
                    <button type="button"
                            class="fav-btn"
                            th:classappend="${favoriteNrs != null and favoriteNrs.contains(m.nr_inmatriculare)} ? ' is-fav' : ''"
                            th:attr="data-nr=${m.nr_inmatriculare}"
                            th:text="${favoriteNrs != null and favoriteNrs.contains(m.nr_inmatriculare)} ? '♥ Favorite' : '♡ Favorite'"
                            onclick="toggleFavCard(this)">
                        ♡ Favorite
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div th:if="${masiniPage != null && masiniPage.totalPages > 1}"
         style="margin-top:16px; display:flex; gap:12px; justify-content:center; align-items:center; flex-wrap:wrap;">

        <a class="btn-small"
           th:if="${masiniPage.hasPrevious()}"
           th:href="@{/marketplace(
                page=${masiniPage.number - 1},
                size=${masiniPage.size},
                sort=${sort},
                marca=${marca},
                modelul=${modelul},
                combustibil=${combustibil},
                culoarea=${culoarea},
                anul=${anul},
                puterea=${puterea},
                pretMin=${pretMin},
                pretMax=${pretMax},
                kmMin=${kmMin},
                kmMax=${kmMax}
           )}">
            Previous
        </a>

        <span th:text="'Pagina ' + ${masiniPage.number + 1} + ' / ' + ${masiniPage.totalPages}"
              style="font-weight:700;"></span>

        <a class="btn-small"
           th:if="${masiniPage.hasNext()}"
           th:href="@{/marketplace(
                page=${masiniPage.number + 1},
                size=${masiniPage.size},
                sort=${sort},
                marca=${marca},
                modelul=${modelul},
                combustibil=${combustibil},
                culoarea=${culoarea},
                anul=${anul},
                puterea=${puterea},
                pretMin=${pretMin},
                pretMax=${pretMax},
                kmMin=${kmMin},
                kmMax=${kmMax}
           )}">
            Next
        </a>

    </div>

</div>

<script>
    function setFavBtnState(btn, isFav) {
        btn.classList.toggle("is-fav", !!isFav);
        btn.textContent = isFav ? "♥ Favorite" : "♡ Favorite";
    }

    function toggleFavCard(btn) {
        const nr = btn.getAttribute("data-nr");
        if (!nr) return;

        btn.disabled = true;

        fetch(`/favorites/toggle/${encodeURIComponent(nr)}`, {
            method: "POST",
            headers: { "Accept": "application/json" }
        })
        .then(r => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
        })
        .then(data => {
            setFavBtnState(btn, data.favorite);
        })
        .catch(err => {
            console.error(err);
            alert("Nu s-a putut salva la favorite. (Ești logat?)");
        })
        .finally(() => {
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
