<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>Marketplace</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background-image: url("/images/login.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            padding: 25px;
            padding-top: 85px;

            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(4px);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            color: white;
            position: relative;
            will-change: transform;
            transform: translateZ(0);
        }

        h1 {
            text-align: center;
            margin: 40px 0 30px 0;
        }

        /* ADVANCED FILTER */
        .advanced-filter {
            background: rgba(20, 24, 35, 0.9);
            backdrop-filter: blur(12px);
            border-radius: 16px;
            padding: 22px 22px 18px 22px;
            margin: 10px 0 22px 0;
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);

            will-change: transform;
    transform: translateZ(0);

            /* ancoră pentru sortare */
            position: relative;
        }

        .filter-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(180px, 1fr));
            gap: 14px 16px;
            align-items: end;
        }

        @media (max-width: 1050px) {
            .filter-grid { grid-template-columns: repeat(2, minmax(180px, 1fr)); }
        }
        @media (max-width: 560px) {
            .filter-grid { grid-template-columns: 1fr; }
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .filter-group label {
            font-size: 12.5px;
            font-weight: 700;
            opacity: 0.95;
        }

        .filter-control {
            display: flex;
            align-items: center;
            gap: 8px;

            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.18);
            background: rgba(255,255,255,0.06);
        }

        .filter-control input,
        .filter-control select {
            width: 100%;
            border: none;
            outline: none;
            background: transparent;
            color: white;
            font-size: 14px;
        }

        .filter-control input::placeholder {
            color: rgba(255,255,255,0.65);
        }

        .filter-control:focus-within {
            border-color: rgba(47,164,245,0.9);
            box-shadow: 0 0 0 3px rgba(47,164,245,0.18);
        }

        /* RANGE (min/max în aceeași casetă) */
        .range {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 560px) {
            .range { grid-template-columns: 1fr; }
        }

        /* === SORTARE FIX ÎN COLȚ STÂNGA-JOS (SINGURUL BLOC) === */
        .sort-box{
            position: absolute;
            left: 22px;
            bottom: 18px;
            width: 280px;
        }

        .sort-label{
            display:block;
            font-size: 12px;
            font-weight: 800;
            letter-spacing: .2px;
            color: rgba(255,255,255,0.85);
            margin: 0 0 6px 2px;
        }

        .sort-select{
            position: relative;
            width: 100%;
        }

        .sort-select select{
            width: 100%;
            height: 44px;
            padding: 10px 42px 10px 14px;
            border-radius: 12px;

            background: rgba(18, 22, 32, 0.95);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.14);
            outline: none;

            font-size: 14px;
            font-weight: 700;

            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;

            /* ajută pe Windows */
            color-scheme: dark;
        }

        .sort-select select:focus{
            border-color: rgba(47,164,245,0.9);
            box-shadow: 0 0 0 3px rgba(47,164,245,0.18);
        }

        .sort-select i{
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
            color: rgba(255,255,255,0.75);
            font-size: 14px;
        }

        /* Placeholder să nu fie “șters” */
        .sort-select select:invalid{
            color: rgba(255,255,255,0.92);
        }

        /* Actions: în dreapta + spațiu pt sortare */
        .filter-actions{
            display: flex;
            justify-content: flex-end;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            margin-top: 16px;

            padding-left: 310px;
            min-height: 54px;
        }

        @media (max-width: 900px){
            .sort-box{
                position: static;
                width: 100%;
                margin-top: 14px;
            }
            .filter-actions{
                padding-left: 0;
                justify-content: space-between;
            }
        }

        .filter-right{
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: #ff3c00;
            border: none;
            padding: 12px 22px;
            border-radius: 12px;
            color: white;
            font-weight: 800;
            cursor: pointer;
            font-size: 14px;
        }
        .filter-btn:hover { background-color: #e63200; }

        .filter-reset {
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            font-size: 14px;
        }
        .filter-reset:hover {
            color: white;
            text-decoration: underline;
        }

        /* GRID listings */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            color: #111;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            overflow: hidden;

            will-change: transform;
    transform: translateZ(0);
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price {
            font-size: 20px;
            font-weight: 800;
            color: #2fa4f5;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 14px;
            color: #333;
            margin: 4px 0;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            background: rgba(47,164,245,0.15);
            color: #1e88e5;
            margin-top: 8px;
        }

        .empty {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .card-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn-small {
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background-color: #2fa4f5;
            font-size: 13px;
            display: inline-block;
        }
        .btn-small:hover { background-color: #1e88e5; }

        /* Favorite button in cards */
        .fav-btn {
            border: 1px solid rgba(47,164,245,0.35);
            background: rgba(255,255,255,0.65);
            color: #0f2a44;
            padding: 7px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
            user-select: none;
            backdrop-filter: blur(8px);
        }
        .fav-btn:hover {
            transform: translateY(-1px);
            background: rgba(255,255,255,0.85);
            border-color: rgba(47,164,245,0.65);
        }
        .fav-btn:active { transform: translateY(0px); }
        .fav-btn.is-fav {
            background: rgba(47,164,245,0.14);
            border-color: rgba(47,164,245,0.9);
            color: #1e88e5;
        }
        .fav-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .brands-container {
    background: rgba(20, 24, 35, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 25px;
    margin-bottom: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.brands-title {
    color: white;
    font-size: 24px;
    font-weight: 800;
    margin-bottom: 25px;
    letter-spacing: 0.5px;
}

.brands-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 1px; /* Creează liniile fine de demarcație */
    background: rgba(255, 255, 255, 0.1); /* Culoarea liniilor */
}

.brand-item {
    background: rgba(20, 24, 35, 1);
    padding: 20px 10px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    transition: all 0.3s ease;
}

.brand-item:hover {
    background: rgba(255, 255, 255, 0.05);
    transform: translateY(-3px);
}

.brand-item img {
    height: 70px;
    width: auto;
    margin-bottom: 12px;
    object-fit: contain;

    opacity: 0.8;
    transition: opacity 0.3s;
}

.brand-item:hover img {
    opacity: 1;
    transform: scale(1.1);
}

.brand-item span {
    color: white;
    font-size: 15px;
    font-weight: 700;
}

/* Responsivitate pentru ecrane mici */
@media (max-width: 600px) {
    .brands-grid {
        grid-template-columns: repeat(3, 1fr);
    }
}

        .featured-section {
    margin-top: 40px;
    width: 100%;
}

.featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
}

.featured-card {
    background: #121620; /* Fundal închis ca în imaginea ta */
    border-radius: 18px;
    overflow: hidden;
    transition: transform 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.05);
    display: flex;
    flex-direction: column;
}

.featured-card:hover {
    transform: translateY(-5px);
    border-color: rgba(47,164,245,0.3);
}

.featured-image-container {
    position: relative;
    height: 180px;
    background: linear-gradient(180deg, rgba(20, 24, 35, 0) 0%, rgba(18, 22, 32, 1) 100%);
    display: flex;
    justify-content: center;
    align-items: flex-end;
    overflow: visible; /* Permite imaginii să "iasă" puțin din cadru dacă e nevoie */
}

.car-hero {
    height: 140px;
    width: auto;
    object-fit: contain;
    z-index: 2;
    filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5));
}

.bg-blur {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.15;
    filter: blur(20px);
    z-index: 1;
}

.featured-info {
    padding: 20px;
}

.featured-name {
    font-size: 20px;
    font-weight: 800;
    margin: 0 0 15px 0;
    color: white;
}

.featured-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
}

.f-tag {
    background: rgba(255, 255, 255, 0.08);
    color: rgba(255, 255, 255, 0.85);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    white-space: nowrap;
}

.view-offer-link {
    color: #2fa4f5;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    display: inline-block;
}

.view-offer-link:hover {
    text-decoration: underline;
}
        /* Containerul secțiunii */
.homepage-featured {
    padding: 40px 0;
    width: 100%;
}

.section-title {
    color: white;
    font-size: 28px;
    font-weight: 800;
    margin-bottom: 30px;
    letter-spacing: -0.5px;
}

/* Gridul de carduri */
.featured-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
    gap: 25px;
}

/* Cardul stilizat (Glassmorphism Dark) */
.featured-card {
    background: linear-gradient(145deg, rgba(28, 35, 49, 0.9) 0%, rgba(15, 19, 28, 0.95) 100%);
    border-radius: 22px;
    border: 1px solid rgba(255, 255, 255, 0.08);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    box-shadow: 0 20px 40px rgba(0,0,0,0.4);
}

.featured-card:hover {
    transform: translateY(-10px) scale(1.02);
    border-color: rgba(47, 164, 245, 0.5);
    box-shadow: 0 30px 60px rgba(0,0,0,0.6);
}

/* Zona de imagine */
.f-image-box {
    position: relative;
    height: 200px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
}

.f-car-img {
    max-width: 90%;
    max-height: 90%;
    object-fit: contain;
    z-index: 2;
    /* Umbră sub mașină pentru efect de plutire */
    filter: drop-shadow(0 15px 15px rgba(0,0,0,0.8));
}

.f-image-blur {
    position: absolute;
    top: -20%; left: -20%; width: 140%; height: 140%;
    background-size: cover;
    background-position: center;
    filter: blur(25px) brightness(0.4);
    opacity: 0.3;
    z-index: 1;
}

/* Info Masina */
.f-content {
    padding: 0 25px 25px 25px;
}

.f-title {
    color: white;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 18px;
}

.f-tag-container {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
}

.f-badge {
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.7);
    padding: 6px 12px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.f-badge.highlight {
    background: rgba(47, 164, 245, 0.15);
    color: #2fa4f5;
    border-color: rgba(47, 164, 245, 0.3);
}

.f-link {
    color: #2fa4f5;
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
    transition: 0.2s;
}

.f-link:hover {
    color: white;
    padding-left: 5px;
}
        /* Container principal */
.carousel-container {
    background: #121620;
    padding: 30px;
    border-radius: 20px;
    margin: 40px 0;
}

.carousel-wrapper {
    position: relative;
    display: flex;
    align-items: center;
}

.carousel-track-container {
    overflow: hidden;
    width: 100%;
    margin: 0 50px;
}

.carousel-track {
    display: flex;
    gap: 20px;
    transition: transform 0.5s ease-in-out;
}

/* Stilul cardului tău alb */
.carousel-card {
    min-width: calc(33.33% - 14px); /* Arată 3 carduri pe ecran */
}

.card-dark {
    background: #1c1f26; /* Griul întunecat din pozele tale */
    border-radius: 18px;
    padding: 18px;
    color: #ffffff; /* Textul devine alb pentru contrast */
    border: 1px solid rgba(255, 255, 255, 0.08); /* Bordură fină */
    transition: border-color 0.3s ease;
}

.card-dark:hover {
    border-color: rgba(47, 164, 245, 0.5);
}

.card-img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    border-radius: 10px;
}

.card-name {
    font-size: 18px;
    margin: 10px 0 5px;
    color: #ffffff;
}

.card-price {
    font-size: 21px;
    font-weight: 800;
    color: #2fa4f5; /* Albastrul tău rămâne pentru accent */
    margin-bottom: 12px;
}

.card-details p {
    font-size: 13px;
    margin: 4px 0;
    color: rgba(255, 255, 255, 0.7); /* Text secundar gri deschis */
}

.card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
}

.year-badge {
    background: rgba(255, 255, 255, 0.1);
    color: rgba(255, 255, 255, 0.9);
    padding: 5px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
}

.btn-view {
    background: #2fa4f5;
    color: white;
    text-decoration: none;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
}

/* Navigația (Săgețile) */
.carousel-nav {
    position: absolute;
    background: rgba(255,255,255,0.1);
    color: white;
    border: none;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    z-index: 10;
    font-size: 18px;
    transition: 0.3s;
}

.carousel-nav:hover { background: #2fa4f5; }
.prev { left: 0; }
.next { right: 0; }

    </style>
</head>

<body>

<div class="container">

    <!-- NAVBAR (nu o atingem) -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>Marketplace</h1>

    <!-- ADVANCED FILTER -->
    <div class="advanced-filter">
        <form th:action="@{/marketplace}" method="get">

            <div class="filter-grid">

                <div class="filter-group">
                    <label>Marcă</label>
                    <div class="filter-control">
                        <input type="text" name="marca" placeholder="Oricare" th:value="${marca}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Model</label>
                    <div class="filter-control">
                        <input type="text" name="modelul" placeholder="Oricare" th:value="${modelul}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Preț</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="pretMin" placeholder="Min" th:value="${pretMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="pretMax" placeholder="Max" th:value="${pretMax}">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Kilometraj</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="kmMin" placeholder="Min" th:value="${kmMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="kmMax" placeholder="Max" th:value="${kmMax}">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>Combustibil</label>
                    <div class="filter-control">
                        <input type="text" name="combustibil" placeholder="Oricare" th:value="${combustibil}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Culoare</label>
                    <div class="filter-control">
                        <input type="text" name="culoarea" placeholder="Oricare" th:value="${culoarea}">
                    </div>
                </div>

                <div class="filter-group">
                    <label>Putere</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="putMin" placeholder="Min" th:value="${putMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="putMax" placeholder="Max" th:value="${putMax}">
                        </div>
                    </div>
                </div>

                <div class="filter-group">
                    <label>An</label>
                    <div class="range">
                        <div class="filter-control">
                            <input type="number" step="1" name="anMin" placeholder="Min" th:value="${anMin}">
                        </div>
                        <div class="filter-control">
                            <input type="number" step="1" name="anMax" placeholder="Max" th:value="${anMax}">
                        </div>
                    </div>
                </div>

            </div>

            <!-- SORTARE (colț stânga jos) -->
            <div class="sort-box">
                <label class="sort-label">Sortare</label>
                <div class="sort-select">
                    <select name="sort" required onchange="this.form.submit()">
                        <option value=""
                                th:selected="${sort == null || sort == ''}">
                            Recommended
                        </option>
                        <option value="price_asc" th:selected="${sort == 'price_asc'}">Preț (low → high)</option>
                        <option value="price_desc" th:selected="${sort == 'price_desc'}">Preț (high → low)</option>
                        <option value="year_asc" th:selected="${sort == 'year_asc'}">An (vechi → nou)</option>
                        <option value="year_desc" th:selected="${sort == 'year_desc'}">An (nou → vechi)</option>
                        <option value="km_asc" th:selected="${sort == 'km_asc'}">KM (low → high)</option>
                        <option value="km_desc" th:selected="${sort == 'km_desc'}">KM (high → low)</option>
                        <option value="pwr_asc" th:selected="${sort == 'pwr_asc'}">Putere (low → high)</option>
                        <option value="pwr_desc" th:selected="${sort == 'pwr_desc'}">Putere (high → low)</option>
                    </select>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
            </div>

            <div class="filter-actions">
                <div class="filter-right">
                    <a class="filter-reset" th:href="@{/marketplace}">↺ Resetează</a>
                    <button type="submit" class="filter-btn">Caută</button>
                </div>
            </div>

        </form>
    </div>

    <div class="carousel-container">
        <h2 class="brands-title">Today's Offers</h2>

        <div class="carousel-wrapper">
            <button class="carousel-nav prev" onclick="moveSlide(-1)">&#10094;</button>

            <div class="carousel-track-container">
                <div class="carousel-track" id="carouselTrack">
                    <div class="carousel-card" th:each="m : ${featuredMasini}">
                        <div class="card-dark">
                            <img th:src="@{'/uploads/' + ${m.imageName}}" class="card-img" alt="Car">
                            <div class="card-body">
                                <h3 class="card-name" th:text="${m.marca + ' ' + m.modelul}">Nume Mașină</h3>
                                <div class="card-price" th:text="${#numbers.formatInteger(m.pretul, 0, 'POINT')} + ' €'">0 €</div>

                                <div class="card-details">
                                    <p>Kilometraj: <span th:text="${#numbers.formatInteger(m.kilometraj, 0, 'POINT')} + ' km'"></span></p>

<script>
    function setFavBtnState(btn, isFav) {
        btn.classList.toggle("is-fav", !!isFav);
        btn.textContent = isFav ? "♥ Favorite" : "♡ Favorite";
    }

    function toggleFavCard(btn) {
        const nr = btn.getAttribute("data-nr");
        if (!nr) return;

        btn.disabled = true;

        fetch(`/favorites/toggle/${encodeURIComponent(nr)}`, {
            method: "POST",
            headers: { "Accept": "application/json" }
        })
        .then(r => {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
        })
        .then(data => {
            setFavBtnState(btn, data.favorite);
        })
        .catch(err => {
            console.error(err);
            alert("Nu s-a putut salva la favorite. (Ești logat?)");
        })
        .finally(() => {
            btn.disabled = false;
        });
    }






    let currentIdx = 0;

function moveSlide(direction) {
    const track = document.getElementById('carouselTrack');
    const cards = document.querySelectorAll('.carousel-card');
    const cardWidth = cards[0].offsetWidth + 20; // lățime + gap
    const maxIndex = cards.length - 3; // presupunând că afișăm 3 carduri

    currentIdx += direction;

    if (currentIdx < 0) currentIdx = 0;
    if (currentIdx > maxIndex) currentIdx = maxIndex;

    track.style.transform = `translateX(-${currentIdx * cardWidth}px)`;
}
</script>
