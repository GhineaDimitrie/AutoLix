<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<div th:fragment="navbar">
    <style>
        /* NAVBAR – local în fragment ca să fie identic pe orice pagină */
        .navbar{
            position: absolute;
            top: 0;
            left: 0;
            right: 0;

            display: flex;
            justify-content: space-between;
            align-items: center;

            padding: 14px 22px;
            box-sizing: border-box;

            background: rgba(0,0,0,0.25);
            backdrop-filter: blur(8px);
            border-radius: 12px 12px 0 0;

            z-index: 50;
        }

        .nav-left a{
            display:flex;
            align-items:center;
            gap:12px;
            text-decoration:none;
        }

        .brand-link{
            display:flex;
            align-items:center;
            gap:12px;
            text-decoration:none;
        }

        .logo{
            height: 54px;
            width: auto;
            object-fit: contain;
            display: block;
            filter: drop-shadow(0 6px 14px rgba(0,0,0,0.35));
        }

        .brand-text{
            display:flex;
            flex-direction:column;
            line-height:1.05;
        }

        .brand-name{
            font-size:28px;
            font-weight:900;
            letter-spacing:0.6px;
            color:#fff;
            text-shadow:0 2px 10px rgba(0,0,0,0.35);
        }

        .brand-accent{ color:#2fa4f5; }

        .brand-tagline{
            margin-top:3px;
            font-size:11.5px;
            font-weight:600;
            letter-spacing:0.2px;
            color: rgba(255,255,255,0.75);
        }

        .nav-right{
            display:flex;
            align-items:center;
            gap:10px;
            flex-wrap:wrap;
        }

        .nav-link{
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration:none;
            color:white;
            background-color:#2fa4f5;
            display:inline-block;
            font-size:14px;
        }
        .nav-link:hover{ background-color:#1e88e5; }

        .nav-link.secondary{ background-color:#7f8c8d; }
        .nav-link.secondary:hover{ background-color:#6c7a7b; }

        .nav-link-green{
            padding: 8px 14px;
            border-radius: 6px;
            text-decoration:none;
            color:white;
            background-color:#27ae60;
            display:inline-block;
            font-size:14px;
        }
        .nav-link-green:hover{ background-color:#1f8f4d; }

        .nav-btn{
            padding: 8px 14px;
            border-radius: 6px;
            border:none;
            cursor:pointer;
            color:white;
            background-color:#e74c3c;
            font-size:14px;
        }
        .nav-btn:hover{ background-color:#c0392b; }

        /* icon buttons */
        .nav-link.icon-btn{
            width: 42px;
            height: 42px;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:0 !important;

            background: rgba(255,255,255,0.08) !important;
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 10px;
        }
        .nav-link.icon-btn:hover{
            background: rgba(255,255,255,0.12) !important;
            border-color: rgba(47,164,245,0.45);
            transform: translateY(-1px);
        }

        .nav-link.icon-btn i{
            font-size:20px;
            width:20px;
            text-align:center;
        }

        .electric-btn:hover i {
    color: #2fa4f5;
    filter: drop-shadow(0 0 5px rgba(47,164,245,0.8));
}
    </style>

    <div class="navbar">
        <div class="nav-left">
            <a th:href="@{/homepage}" class="brand-link">
                <img src="/images/logo3.png" alt="AutoLix Logo" class="logo">
                <div class="brand-text">
                    <div class="brand-name">Auto<span class="brand-accent">Lix</span></div>
                    <div class="brand-tagline">Marketplace auto • verified listings!</div>
                </div>
            </a>
        </div>

        <div class="nav-right">

            <a th:href="@{/electric}"
               class="nav-link icon-btn electric-btn"
               title="Vehicule Electrice">
                <i class="fa-solid fa-bolt"></i>
            </a>

            <div sec:authorize="hasAnyRole('ADMIN','EDITOR')">
                <a class="nav-link icon-btn" th:href="@{/masini}" title="Database">
                    <i class="fa-solid fa-database"></i>
                </a>
            </div>

            <a class="nav-link icon-btn"
               sec:authorize="isAuthenticated()"
               th:href="@{/favorites}"
               title="Favorites">
                <i class="fa-regular fa-heart"></i>
            </a>



            <a class="nav-link icon-btn"
               sec:authorize="isAuthenticated()"
               th:href="@{/my-profile}"
               title="My Profile">
                <i class="fa-solid fa-user"></i>
            </a>

            <a class="nav-link" th:href="@{/marketplace}">Marketplace</a>

            <a class="nav-link-green" sec:authorize="isAuthenticated()" th:href="@{/masini/add}">+ Sell now</a>

            <a class="nav-link" sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>

            <a class="nav-link secondary" sec:authorize="isAnonymous()" th:href="@{/signup}">Sign up</a>

            <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="margin:0;">
                <button type="submit" class="nav-btn">Logout</button>
            </form>
        </div>
    </div>
</div>
