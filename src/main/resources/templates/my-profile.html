<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <meta charset="UTF-8">
    <title>My Profile</title>

    <style>
        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, sans-serif;
            background-image: url("/images/login.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            padding: 25px;
            padding-top: 85px; /* same as marketplace for absolute navbar */

            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            box-shadow: 0 0 25px rgba(0,0,0,0.3);
            color: white;
            position: relative;
        }

        h1 {
            text-align: center;
            margin: 0 0 18px 0;
        }

        .empty {
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
        }

        .btn-small {
            padding: 7px 12px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            background-color: #2fa4f5;
            font-size: 13px;
            display: inline-block;
        }
        .btn-small:hover { background-color: #1e88e5; }

        .btn-danger {
            border: none;
            cursor: pointer;
            background: #e74c3c;
        }
        .btn-danger:hover { background: #c0392b; }

        /* GRID listings (same style as marketplace) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 15px;
        }

        .card {
            background: rgba(255,255,255,0.95);
            color: #111;
            border-radius: 10px;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            overflow: hidden;
        }

        .card-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .price {
            font-size: 20px;
            font-weight: 800;
            color: #2fa4f5;
            margin-bottom: 10px;
        }

        .meta {
            font-size: 14px;
            color: #333;
            margin: 4px 0;
        }

        .tag {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 999px;
            font-size: 12px;
            background: rgba(47,164,245,0.15);
            color: #1e88e5;
            margin-top: 8px;
        }

        .card-actions {
            margin-top: 10px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- NAVBAR -->
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <h1>My Profile</h1>

    <div th:if="${#lists.isEmpty(masini)}" class="empty">
        Nu ai anunțuri încă.
        <div style="margin-top:10px;">
            <a class="btn-small" th:href="@{/masini/add}">+ Creează primul anunț</a>
        </div>
    </div>

    <div class="grid" th:if="${not #lists.isEmpty(masini)}">
        <div class="card" th:each="m : ${masini}">

            <img th:if="${m.imageName != null}"
                 th:src="@{'/uploads/' + ${m.imageName}}"
                 style="width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:10px;">

            <div class="card-title" th:text="${m.marca} + ' ' + ${m.modelul}"></div>
            <div class="price" th:text="${#numbers.formatInteger(m.pretul, 0, 'POINT')} + ' €'"></div>

            <div class="meta" th:text="'Kilometraj: ' + ${#numbers.formatInteger(m.kilometraj, 0, 'POINT')} + ' km'"></div>
            <div class="meta" th:text="'Putere: ' + ${m.puterea} + ' CP'"></div>
            <div class="meta" th:text="'Culoare: ' + ${m.culoarea}"></div>
            <div class="meta" th:text="'Combustibil: ' + ${m.combustibil}"></div>
            <div class="meta" th:text="'Cuplu: ' + ${m.cuplul} + ' Nm'"></div>

            <span class="tag" th:text="${m.anul}"></span>

            <div class="card-actions">
                <a class="btn-small" th:href="@{'/masini/edit/' + ${m.nr_inmatriculare}}">Edit</a>

                <form th:action="@{'/masini/delete/' + ${m.nr_inmatriculare}}"
                      method="post" style="margin:0;"
                      onsubmit="return confirm('Sigur ștergi anunțul?');">
                    <button type="submit" class="btn-small btn-danger">Delete</button>
                </form>
            </div>

        </div>
    </div>

</div>

</body>
</html>
